<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      console.log("Hello from JavaScript!"); // string
      console.log(100); // number
      console.log(true); // boolean

      let name = "Rahul";
      let age = 22;
      console.log("Name:", name, "Age:", age); // multiple values
      console.log(name + " is " + age + " years old."); // concatenated string
    </script>
  </body>
</html>
