<!doctype html>
<html>
  <head>
    <title>Another document.write example</title>
  </head>
  <body>
    <h1>Page loading...</h1>

    <script>
      // Step 1: Write some text and styling
      document.write("<h2>Welcome to my page!</h2>");
      document.write(
        "<p style='color: blue;'>This content is written by JavaScript.</p>",
      );

      // Step 2: Write numbers and a simple calculation
      document.write("First number: 10<br>");
      document.write("Second number: 25<br>");
      document.write("Sum: " + (10 + 25) + "<br>");

      // Step 3: Write a list using HTML
      document.write("<ul>");
      document.write("  <li>Item 1 from JS</li>");
      document.write("  <li>Item 2 from JS</li>");
      document.write("  <li>Item 3 from JS</li>");
      document.write("</ul>");
    </script>
  </body>
</html>
