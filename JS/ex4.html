<!doctype html>
<html>
  <head>
    <title>Script in head</title>
    <script>
      function greet() {
        console.log("Hello from head script!");
      }
    </script>
  </head>
  <body>
    <!-- Later you can call greet() from an event -->
    <button onclick="greet()">Click me</button>
  </body>
</html>
